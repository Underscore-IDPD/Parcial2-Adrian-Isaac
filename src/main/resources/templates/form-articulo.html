<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modo == 'editar'} ? 'Editar Artículo' : 'Nuevo Artículo'">
        Nuevo Artículo
    </title>
    <link rel="stylesheet" href="/css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Articulos</a>

        <div class="d-flex align-items-center">

            <!-- Si NO está loggeado -->
            <a th:if="${usuario == null}"
               href="/login"
               class="btn btn-outline-dark">
                Login
            </a>

            <!-- Si está loggeado -->
            <div th:if="${usuario != null}"
                 class="d-flex align-items-center">

                <!-- Foto -->
                <img th:src="${usuario.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px; height:35px; object-fit:cover;" />

                <!-- Username -->
                <span>Hola,
                <strong class="me-3"
                        th:text="${usuario.username}">
                </strong>
                </span>

                <!-- Logout -->
                <a href="/logout"
                   class="btn btn-outline-dark btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <!-- TÍTULO DINÁMICO -->
                    <h3 class="mb-4"
                        th:text="${modo == 'editar'} ?
                                 'Editar Artículo' :
                                 'Crear Nuevo Artículo'">
                        Crear Nuevo Artículo
                    </h3>

                    <!-- ERROR -->
                    <div th:if="${error > 0}"
                         class="alert alert-danger"
                         th:text="${errormsg}">
                    </div>

                    <!-- FORM -->
                    <form method="post"
                          th:action="${modo == 'editar'} ?
                          @{/eventos/{id}/edit(id=${evento.id})} :
                                     @{/eventos}">

                        <!-- TÍTULO -->
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text"
                                   name="titulo"
                                   class="form-control"
                                   required
                                   th:value="${evento != null ? evento.titulo : ''}">
                        </div>

                        <!-- CONTENIDO -->
                        <div class="mb-3">
                            <label class="form-label">Contenido</label>
                            <textarea name="cuerpo"
                                      class="form-control"
                                      rows="6"
                                      required
                                      th:text="${evento != null ? evento.cuerpo : ''}">
                            </textarea>
                        </div>

                        <!-- ETIQUETAS -->
                        <div class="mb-3">
                            <label class="form-label">
                                Etiquetas (separadas por coma)
                            </label>
                            <input type="text"
                                   name="etiqueta"
                                   class="form-control"
                                   placeholder="java, backend, web"
                                   th:value="${etiquetasTexto}">
                        </div>

                        <!-- BOTONES -->
                        <div class="d-flex justify-content-between">

                            <a th:href="${modo == 'editar'} ?
                                        @{/eventos/{id}(id=${evento.id})} :
                                        @{/}"
                               class="btn btn-dark">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary"
                                    th:text="${modo == 'editar'} ?
                                             'Guardar Cambios' :
                                             'Publicar'">
                                Publicar
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
