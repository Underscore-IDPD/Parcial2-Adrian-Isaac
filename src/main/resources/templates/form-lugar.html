<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modo == 'editar'} ? 'Editar Lugar' : 'Registrar Lugar'">Registrar Lugar</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <span class="me-3 d-flex align-items-center">

                <!-- Foto -->
                <img th:src="${usuarioActual.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px; height:35px; object-fit:cover;" />

                <!-- Texto -->
                Hola,
                <strong class="ms-1"
                        th:text="${usuarioActual.username}">
                    Usuario
                </strong>

            </span>

            <a href="/logout"
               class="btn btn-outline-dark btn-sm">
                Logout
            </a>

        </div>

    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title"
                        th:text="${modo == 'editar'} ? 'Editar Lugar' : 'Registrar Lugar'">
                        Registrar Lugar
                    </h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:action="${modo == 'editar'} ?
                                @{/lugares/{id}/edit(id=${lugar.id})} :
                                @{/lugares}">

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre</label>
                            <input type="text"
                                   name="nombre"
                                   class="form-control"
                                   placeholder="Nombre"
                                   required
                                   th:value="${lugar != null ? lugar.nombre : ''}">
                        </div>

                        <!-- Capacidad -->
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Capacidad</label>
                            <input type="number"
                                   name="capacidad"
                                   class="form-control"
                                   min="1"
                                   th:value="${lugar != null} ? ${lugar.maxCapacidad} : ''"
                                   required>
                        </div>

                        <!-- Foto actual (solo en editar si existe) -->
                        <div class="mb-3 text-center" th:if="${modo == 'editar'}">
                            <label class="form-label small fw-bold d-block">Foto actual</label>
                            <img th:src="${lugar.fotoDataUrl}"
                                 id="lugarPreview"
                                 class="img-fluid rounded mt-2"
                                 style="height:180px;width:100%;object-fit:cover;" />
                        </div>

                        <!-- Subir nueva foto -->
                        <div class="mb-3">
                            <label class="form-label small fw-bold">
                                <span th:text="${modo == 'editar'} ? 'Cambiar Foto (opcional)' : 'Foto de Perfil'"></span>
                            </label>
                            <input type="file"
                                   id="archivo"
                                   name="foto"
                                   class="form-control"
                                   accept="image/*"
                                   onchange="actualizarLugar(this)">
                            <div class="form-text">Formatos permitidos: PNG, JPG, JPEG, WEBP, GIF.</div>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex justify-content-between">
                            <a href="/usuarios"
                               class="btn btn-dark">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary"
                                    th:text="${modo == 'editar'} ? 'Editar' : 'Registrar'">
                                Registrar
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function actualizarLugar(input) {
        if (input.files && input.files[0]) {

            const preview = document.getElementById('lugarPreview');

            if (preview) {
                preview.src = URL.createObjectURL(input.files[0]);
            }
        }
    }
</script>

</body>
</html>
