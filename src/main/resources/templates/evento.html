<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${evento.concepto}">Evento</title>

    <link rel="stylesheet" href="/css/estilo.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <a th:if="${usuario == null}"
               href="/login"
               class="btn btn-outline-dark">
                Login
            </a>

            <div th:if="${usuario != null}"
                 class="d-flex align-items-center">

                <img th:src="${usuario.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px;height:35px;object-fit:cover;"/>

                <span>
                    Hola,
                    <strong class="me-3"
                            th:text="${usuario.username}">
                    </strong>
                </span>

                <a href="/logout"
                   class="btn btn-outline-dark btn-sm">
                    Logout
                </a>

            </div>

        </div>
    </div>
</nav>


<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <!-- ================= EVENTO ================= -->
            <div class="card shadow-sm mb-4 overflow-hidden">

                <!-- ===== BANNER ===== -->
                <div class="position-relative">

                    <img th:src="${evento.fotoDataUrl}"
                         class="w-100 banner-evento"
                         alt="Banner evento">

                    <div class="banner-gradient"></div>

                    <div class="banner-text">

                        <h1 class="fw-bold text-white mb-3"
                            th:text="${evento.concepto}">
                        </h1>

                        <div class="d-flex align-items-center">

                            <img th:src="${organizador.fotoDataUrl}"
                                 class="organizador-avatar me-3"
                                 alt="Organizador">

                            <div class="text-white">

                                <small class="opacity-75 d-block">
                                    Organizado por
                                </small>

                                <span class="fw-semibold fs-5"
                                      th:text="${organizador.username}">
                                </span>

                            </div>

                        </div>

                    </div>

                    <div class="banner-badge">

                    <span th:if="${evento.termino}"
                          class="badge bg-secondary">
                    Finalizado
                    </span>

                        <span th:if="${!evento.termino && inscritos >= evento.cupoMaximo}"
                              class="badge bg-danger">
                        Evento lleno
                        </span>

                    </div>

                </div>


                <!-- ===== BODY ===== -->
                <div class="card-body">

                    <!-- ===== META INFO ===== -->
                    <div class="border-bottom pb-2 mb-3">

                        <p class="text-muted small mb-0">
                            Creado el
                            <span th:text="${#temporals.format(evento.fechaCreacion,'dd/MM/yyyy HH:mm')}"></span>

                            <span th:if="${evento.fechaModificacion != evento.fechaCreacion}">
                                · Editado el
                                <span th:text="${#temporals.format(evento.fechaModificacion,'dd/MM/yyyy HH:mm')}"></span>
                            </span>

                        </p>

                    </div>

                    <!-- ================= BOTONES ADMIN ================= -->

                    <div class="mb-3 d-flex gap-2">

                        <a th:if="${puedeEditar and evento.estado.name() == 'Pendiente'}"
                           th:href="@{/eventos/{id}/edit(id=${evento.id})}"
                           class="btn btn-outline-primary btn-sm">
                            Editar evento
                        </a>

                        <form th:if="${puedeCancelar and evento.estado.name() == 'Pendiente'}"
                              th:action="@{/eventos/{id}/cancel(id=${evento.id})}"
                              method="post">

                            <input type="hidden" name="razon" class="razonOculta">

                            <button type="button" onclick="razonCancelacion(this)" class="btn btn-outline-warning btn-sm">
                                Cancelar evento
                            </button>

                        </form>

                        <form th:if="${puedeEliminar}"
                              th:action="@{/eventos/{id}/delete(id=${evento.id})}"
                              method="post">

                            <button class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('¿Eliminar este evento?')">
                                Eliminar evento
                            </button>

                        </form>

                    </div>


                    <div class="row">

                        <!-- ========= INFO EVENTO ========= -->
                        <div class="col-md-8 d-flex flex-column">

                            <div th:with="textosSeparados=${#strings.arraySplit(evento.descripcion, '|||')}">

                                <p class="card-text mb-3" th:text="${textosSeparados[0]}"></p>

                                <div th:if="${evento.estado.name() == 'Cancelado'}"
                                     class="alert alert-danger py-2 px-3 mb-3" role="alert" style="font-size: 0.9em;">

                                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                    <strong>Cancelado por:</strong>

                                    <span th:if="${#arrays.length(textosSeparados) > 1}" th:text="${textosSeparados[1]}">
                                        Explicacion
                                    </span>

                                </div>

                            </div>

                            <div class="mt-auto pt-3">
                                <span th:each="e : ${evento.etiquetas}"
                                      class="badge bg-dark me-1"
                                      th:text="${e.nombre}">
                                </span>
                            </div>

                        </div>


                        <!-- ========= LUGAR ========= -->
                        <div class="col-md-4 border-start">

                            <img th:src="${evento.lugar.fotoDataUrl}"
                                 class="img-fluid rounded mb-2"
                                 style="height:180px;width:100%;object-fit:cover;"/>

                            <h6 class="fw-bold"
                                th:text="|Ubicación: ${evento.lugar.nombre}|">
                            </h6>

                            <button th:if="${estaInscrito}"
                                    class="btn btn-secondary btn-sm w-100 mt-3"
                                    disabled>
                                Ya inscrito
                            </button>

                            <form th:if="${usuario != null && !estaInscrito &&
                                          inscritos < evento.cupoMaximo &&
                                          !evento.termino && evento.estado.name() == 'Pendiente'}"
                                  th:action="@{/eventos/{id}/inscribirse(id=${evento.id})}"
                                  method="post">

                                <button class="btn btn-success btn-sm w-100 mt-3">
                                    Inscribirme
                                </button>

                            </form>

                        </div>
                    </div>

                    <hr>

                    <!-- ========= DETALLES ========= -->
                    <div class="row text-center">

                        <div class="col-md-3">
                            <small class="text-muted">Fecha</small>
                            <div class="fw-semibold"
                                 th:text="${#temporals.format(evento.fechaEvento,'dd/MM/yyyy')}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Hora</small>
                            <div class="fw-semibold"
                                 th:text="${#temporals.format(evento.fechaEvento,'HH:mm')}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Duración</small>
                            <div class="fw-semibold"
                                 th:text="${evento.duracionFormateada}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Cupos disponibles</small>
                            <div class="fw-semibold"
                                 th:text="${cuposDisponibles}">
                            </div>
                        </div>

                    </div>

                </div>
            </div>


            <!-- ================= COMENTARIOS ================= -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">Comentarios</h4>

                    <p th:if="${#lists.isEmpty(comentarios)}"
                       class="text-muted">
                        Aún no hay comentarios.
                    </p>

                    <div th:each="c : ${comentarios}" class="mb-3">
                        <div class="border rounded p-3">

                            <div class="d-flex align-items-center mb-2">

                                <img th:src="${usuarios.get(c.autor.id).fotoDataUrl}"
                                     class="comentario-avatar me-2"
                                     alt="Autor comentario">

                                <div>

                                    <strong th:text="${usuarios.get(c.autor.id).username}">
                                    </strong>

                                    <div class="text-muted small"
                                         th:text="${#temporals.format(c.fecha,'dd/MM/yyyy HH:mm')}">
                                    </div>

                                </div>

                            </div>

                            <p th:text="${c.texto}"></p>

                        </div>
                    </div>

                    <form th:if="${usuario != null}"
                          method="post"
                          th:action="@{/eventos/{id}/comentarios(id=${evento.id})}">

                        <div class="mb-3">
<textarea name="texto"
          class="form-control"
          rows="3"
          placeholder="Escribe un comentario..."
          required></textarea>
                        </div>

                        <button class="btn btn-primary btn-sm">
                            Comentar
                        </button>

                    </form>

                    <p th:if="${usuario == null}"
                       class="text-muted">
                        Debes iniciar sesión para comentar.
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function razonCancelacion(botonPresionado){
        let razon = prompt('Razón de la cancelación:');

        if(razon != null && razon.trim() != ""){
            let formulario = botonPresionado.closest('form');

            formulario.querySelector('.razonOculta').value = razon;
            formulario.submit();
        }else{
            alert("Debes ingresar una razón para cancelar el evento")
        }
    }
</script>
</body>
</html>
