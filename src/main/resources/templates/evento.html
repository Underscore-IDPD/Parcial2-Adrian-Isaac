<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${evento.concepto}">Evento</title>

    <link rel="stylesheet" href="/css/estilo.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <a th:if="${usuario == null}"
               href="/login"
               class="btn btn-outline-dark">
                Login
            </a>

            <div th:if="${usuario != null}"
                 class="d-flex align-items-center">

                <img th:src="${usuario.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px;height:35px;object-fit:cover;"/>

                <span>
                    Hola,
                    <strong class="me-3"
                            th:text="${usuario.username}">
                    </strong>
                </span>

                <a href="/logout"
                   class="btn btn-outline-dark btn-sm">
                    Logout
                </a>

            </div>

        </div>
    </div>
</nav>


<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <!-- ================= EVENTO ================= -->
            <div class="card shadow-sm mb-4 overflow-hidden">

                <!-- ===== BANNER ===== -->
                <div class="position-relative">

                    <img th:src="${evento.fotoDataUrl}"
                         class="w-100 banner-evento"
                         alt="Banner evento">

                    <!-- Gradiente oscuro -->
                    <div class="banner-gradient"></div>

                    <!-- TEXTO SOBRE IMAGEN -->
                    <div class="banner-text">

                        <h1 class="fw-bold text-white mb-1"
                            th:text="${evento.concepto}">
                        </h1>

                        <h5 class="text-white"
                            th:text="|Organizado por ${organizador.username}|">
                        </h5>

                    </div>

                    <!-- BADGE ESTADO -->
                    <div class="banner-badge">

            <span th:if="${evento.termino}"
                  class="badge bg-secondary">
                Finalizado
            </span>

                        <span th:if="${!evento.termino && inscritos >= evento.cupoMaximo}"
                              class="badge bg-danger">
                Evento lleno
            </span>

                    </div>

                </div>


                <!-- ===== BODY ===== -->
                <div class="card-body">

                    <!-- ===== META INFO ===== -->
                    <div class="border-bottom pb-2 mb-3">

                        <p class="text-muted small mb-0">
                            Creado el
                            <span th:text="${#temporals.format(evento.fechaCreacion,'dd/MM/yyyy HH:mm')}"></span>

                            <span th:if="${evento.fechaModificacion != evento.fechaCreacion}">· Editado el
                                <span th:text="${#temporals.format(evento.fechaModificacion,'dd/MM/yyyy HH:mm')}"></span>
                            </span>
                        </p>

                    </div>

                    <div class="row">

                        <!-- ========= INFO EVENTO ========= -->
                        <div class="col-md-8 d-flex flex-column">

                            <p class="mt-3"
                               th:text="${evento.descripcion}">
                            </p>

                            <div class="mt-auto pt-3">
                                <span th:each="e : ${evento.etiquetas}"
                                      class="badge bg-dark me-1"
                                      th:text="${e.nombre}">
                                </span>
                            </div>

                        </div>


                        <!-- ========= LUGAR ========= -->
                        <div class="col-md-4 border-start">

                            <img th:src="${evento.lugar.fotoDataUrl}"
                                 class="img-fluid rounded mb-2"
                                 style="height:180px;width:100%;object-fit:cover;"/>

                            <h6 class="fw-bold"
                                th:text="|Ubicación: ${evento.lugar.nombre}|">
                            </h6>


                            <!-- ADMIN / ORGANIZADOR -->
                            <a th:if="${usuario != null &&
                   (esAdmin || usuario.id == evento.organizador.id)}"
                               href="#"
                               class="btn btn-outline-primary btn-sm w-100 mt-3">
                                Estadísticas evento
                            </a>


                            <!-- YA INSCRITO -->
                            <button th:if="${estaInscrito}"
                                    class="btn btn-secondary btn-sm w-100 mt-3"
                                    disabled>
                                Ya inscrito
                            </button>


                            <!-- INSCRIBIRSE -->
                            <form th:if="${usuario != null && !estaInscrito &&
                      !(esAdmin || usuario.id == evento.organizador.id) &&
                      inscritos < evento.cupoMaximo &&
                      !evento.termino}"
                                  th:action="@{/eventos/{id}/inscribirse(id=${evento.id})}"
                                  method="post">

                                <button class="btn btn-success btn-sm w-100 mt-3">
                                    Inscribirme
                                </button>

                            </form>

                        </div>
                    </div>

                    <hr>

                    <!-- ========= DETALLES ========= -->
                    <div class="row text-center">

                        <div class="col-md-3">
                            <small class="text-muted">Fecha</small>
                            <div class="fw-semibold"
                                 th:text="${#temporals.format(evento.fechaEvento,'dd/MM/yyyy')}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Hora</small>
                            <div class="fw-semibold"
                                 th:text="${#temporals.format(evento.fechaEvento,'HH:mm')}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Duración</small>
                            <div class="fw-semibold"
                                 th:text="${evento.duracionFormateada}">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <small class="text-muted">Cupos disponibles</small>
                            <div class="fw-semibold"
                                 th:text="${cuposDisponibles}">
                            </div>
                        </div>

                    </div>

                </div>
            </div>

            <!-- ================= COMENTARIOS ================= -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-3">Comentarios</h4>

                    <p th:if="${#lists.isEmpty(comentarios)}"
                       class="text-muted">
                        Aún no hay comentarios.
                    </p>

                    <div th:each="c : ${comentarios}" class="mb-3">
                        <div class="border rounded p-3">

                            <p class="mb-1">
                                <strong th:text="${usuarios.get(c.organizador.id).username}"></strong>
                                <span class="text-muted small ms-2"
                                      th:text="${#temporals.format(c.fecha,'dd/MM/yyyy HH:mm')}">
</span>
                            </p>

                            <p th:text="${c.texto}"></p>

                        </div>
                    </div>

                    <form th:if="${usuario != null}"
                          method="post"
                          th:action="@{/eventos/{id}/comentarios(id=${evento.id})}">

                        <div class="mb-3">
<textarea name="texto"
          class="form-control"
          rows="3"
          placeholder="Escribe un comentario..."
          required></textarea>
                        </div>

                        <button class="btn btn-primary btn-sm">
                            Comentar
                        </button>

                    </form>

                    <p th:if="${usuario == null}"
                       class="text-muted">
                        Debes iniciar sesión para comentar.
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
