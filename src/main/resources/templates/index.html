<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/estilo.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <title>Inicio</title>
</head>

<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <!-- Si NO está loggeado -->
            <a th:if="${usuario == null}"
               href="/login"
               class="btn btn-outline-dark">
                Login
            </a>

            <!-- Si está loggeado -->
            <div th:if="${usuario != null}"
                 class="d-flex align-items-center">

                <!-- Foto -->
                <img th:src="${usuario.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px; height:35px; object-fit:cover;" />

                <!-- Username -->
                <span>Hola,
                <strong class="me-3"
                        th:text="${usuario.username}">
                </strong>
                </span>

                <!-- Logout -->
                <a href="/logout"
                   class="btn btn-outline-dark btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<div class="container">
    <div class="row">

        <!-- COLUMNA PRINCIPAL -->
        <div class="col-md-9">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Eventos</h3>

                <div class="d-flex">
                    <!-- BOTÓN CREAR USUARIO -->
                    <a th:if="${usuario != null and usuario.rol.name == 'Administrador'}"
                       href="/usuarios"
                       class="btn btn-sm btn-dark me-2"->
                        Usuarios
                    </a>

                    <!-- BOTÓN CREAR LUGAR -->
                    <a th:if="${usuario != null and usuario.rol.name == 'Administrador'}"
                       href="/lugares"
                       class="btn btn-sm btn-dark me-2">
                        Lugares
                    </a>

                    <!-- BOTÓN CREAR EVENTO -->
                    <a th:if="${usuario != null and usuario.rol.name() != 'Participante'}"
                       href="/eventos/"
                       class="btn btn-primary btn-sm">
                        Nuevo Evento
                    </a>
                </div>

            </div>

            <!-- MENSAJE SI NO HAY EVENTOS -->
            <p th:if="${#lists.isEmpty(eventos)}"
               class="text-muted">
                No hay eventos publicados.
            </p>

            <!-- LISTADO DE EVENTOS -->
            <div class="card mb-4 shadow-sm"
                 th:each="a : ${eventos}">
                <div class="card-body">

                    <h2 class="card-title h4"
                        th:text="${a.concepto}">
                        Concepto
                    </h2>

                    <p class="small text-muted">
                        Por
                        <span th:text="${usuarios.get(a.organizador.id).username}">
                            Organizador
                        </span>
                        <span th:text="${#temporals.format(a.fechaEvento, 'dd/MM/yyyy HH:mm')}">
                            Fecha
                        </span>
                    </p>

                    <p class="card-text"
                       th:text="${#strings.abbreviate(a.descripcion,73)}">
                    </p>

                    <!-- ETIQUETAS DEL EVENTO -->
                    <div class="mb-3">
                        <a th:each="e : ${a.etiquetas}"
                           th:href="@{/etiqueta/{nombre}(nombre=${e.nombre})}"
                           class="badge bg-dark text-decoration-none me-1"
                           th:text="${e.nombre}">
                        </a>
                    </div>

                    <a th:href="@{/eventos/{id}(id=${a.id})}"
                       class="btn btn-outline-primary btn-sm">
                        Leer más
                    </a>

                </div>
            </div>

            <nav aria-label="Navegación de eventos" class="mt-5 mb-4" th:if="${totalPaginas > 1}">
                <ul class="pagination justify-content-center">

                    <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/(pagina=${paginaActual - 1})}" tabindex="-1">Anterior</a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(inicioRango, finRango)}"
                        th:classappend="${paginaActual == i} ? 'active'">
                        <a class="page-link" th:href="@{/(pagina=${i})}" th:text="${i + 1}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${paginaActual == (totalPaginas - 1)} ? 'disabled'">
                        <a class="page-link" th:href="@{/(pagina=${paginaActual + 1})}">Siguiente</a>
                    </li>

                </ul>
            </nav>

        </div>

        <!-- SIDEBAR -->
        <div class="col-md-3">
            <div class="p-4 mb-3 bg-white rounded shadow-sm">

                <h4 class="mb-3">Etiquetas</h4>

                <div class="d-flex flex-wrap">

                    <a th:each="e : ${etiquetas}"
                       th:href="@{/etiqueta/{nombre}(nombre=${e.nombre})}"
                       class="badge bg-dark text-decoration-none p-2 m-1"
                       th:text="${e.nombre}">
                    </a>

                    <p th:if="${#lists.isEmpty(etiquetas)}"
                       class="text-muted small">
                        No se encontraron etiquetas.
                    </p>

                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
