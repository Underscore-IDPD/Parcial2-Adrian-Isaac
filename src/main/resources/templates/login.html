<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/estilo.css">
    <title>Login</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Blog</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center mt-5 pt-5">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="card-title h4 mb-4 text-center">Inicio de Sesión</h3>

                        <div th:if="${error}" class="alert alert-danger p-2 small" role="alert">
                            Usuario o contraseña incorrectos.
                        </div>

                        <form method="post" action="/login">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Usuario</label>
                                <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" name="recordar" id="recordar">
                                <label class="form-check-label" for="recordar">Recordar</label>
                            </div>
                            <div> <button type="submit" class="btn btn-primary">Acceder</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
