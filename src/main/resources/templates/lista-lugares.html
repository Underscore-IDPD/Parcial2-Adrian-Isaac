<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <title>Lugares</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <!-- Si NO está loggeado -->
            <a th:if="${usuario == null}"
               href="/login"
               class="btn btn-outline-dark">
                Login
            </a>

            <!-- Si está loggeado -->
            <div th:if="${usuario != null}"
                 class="d-flex align-items-center">

                <!-- Foto -->
                <img th:src="${usuario.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px; height:35px; object-fit:cover;" />

                <!-- Username -->
                <span>Hola,
                <strong class="me-3"
                        th:text="${usuario.username}">
                </strong>
                </span>

                <!-- Logout -->
                <a href="/logout"
                   class="btn btn-outline-dark btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>

<main class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold text-dark">Gestión de Lugares</h2>

        <a href="/lugares/crear" class="btn btn-dark shadow-sm px-4">
            Registrar Lugar
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">

            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4 py-3 text-secondary">Foto</th>
                    <th class="py-3 text-secondary">ID</th>
                    <th class="py-3 text-secondary">Nombre de Lugar</th>
                    <th class="text-end pe-4 py-3 text-secondary">Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="l : ${lugares}">

                    <!-- FOTO -->
                    <td class="ps-4">
                        <img th:src="${l.fotoDataUrl}"
                             class="rounded-circle me-2"
                             style="width:70px; height:70px; object-fit:cover;" />
                    </td>

                    <!-- ID -->
                    <td class="fw-bold text-secondary"
                        th:text="${l.id}">
                        1
                    </td>

                    <!-- USERNAME -->
                    <td class="fw-medium"
                        th:text="${l.nombre}">
                        nombre
                    </td>

                    <!-- ACCIONES -->
                    <td class="text-end pe-4">

                        <a th:if="${!l.activo}"
                              th:href="@{/lugares/{id}/edit(id=${l.id})}"
                              class="btn btn-sm btn-outline-primary me-2">
                            Editar
                        </a>

                        <form th:if="${l.activo && !lugaresConEventos.contains(l.id)}"
                              th:action="@{/lugares/{id}/deactivate(id=${l.id})}"
                              method="post"
                              class="d-inline">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('¿Desactivar lugar? (Se quitará de todos sus eventos pendientes)');">
                                Desactivar
                            </button>
                        </form>

                        <form th:if="${!l.activo}"
                              th:action="@{/lugares/{id}/activate(id=${l.id})}"
                              method="post"
                              class="d-inline">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-warning me-2"
                                    onclick="return confirm('¿Reactivar lugar? (No se pueden realizar cambios a un lugar activo)');">
                                Activar
                            </button>
                        </form>

                        <form th:if="${!l.activo && !lugaresConEventos.contains(l.id)}"
                              th:action="@{/lugares/{id}/delete(id=${l.id})}"
                              method="post"
                              class="d-inline">

                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger me-2"
                                    onclick="return confirm('¿Eliminar lugar?');">
                                Eliminar
                            </button>
                        </form>

                        <span th:if="${!l.activo}"
                              class="text-muted small ms-2 fw-semibold">
                            (Inactivo)
                        </span>

                    </td>
                </tr>

                <!-- SIN LUGARES -->
                <tr th:if="${#lists.isEmpty(lugares)}">
                    <td colspan="5" class="text-center text-muted py-5">
                        <p class="mb-0">
                            No hay lugares registrados en el sistema.
                        </p>
                    </td>
                </tr>

                </tbody>
            </table>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
