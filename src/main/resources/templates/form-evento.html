<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title th:text="${modo == 'editar'} ? 'Editar Evento' : 'Crear Evento'"></title>

    <link rel="stylesheet" href="/css/estilo.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

</head>

<body class="bg-light">

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Lista de Eventos</a>

        <div class="d-flex align-items-center">

            <span class="me-3 d-flex align-items-center">

                <!-- Foto -->
                <img th:src="${usuarioActual.fotoDataUrl}"
                     class="rounded-circle me-2"
                     style="width:35px; height:35px; object-fit:cover;" />

                <!-- Texto -->
                Hola,
                <strong class="ms-1"
                        th:text="${usuarioActual.username}">
                    Usuario
                </strong>

            </span>

            <a href="/logout"
               class="btn btn-outline-dark btn-sm">
                Logout
            </a>

        </div>

    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="card shadow-sm">

                <img id="previewBanner"
                     th:src="${evento != null and evento.fotoDataUrl != null} ? ${evento.fotoDataUrl} : '/img/default-banner.png'"
                     class="w-100"
                     style="height:240px;object-fit:cover;">

                <div class="card-body">

                    <h3 class="mb-4"
                        th:text="${modo == 'editar'} ? 'Editar Evento' : 'Crear Nuevo Evento'">
                    </h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:action="${modo} == 'editar' ? @{'/eventos/' + ${evento.id}} : @{/eventos}"
                          class="needs-validation"
                          novalidate>

                        <input type="hidden"
                               th:if="${modo == 'editar'}"
                               name="_method"
                               value="PUT">

                        <div class="mb-3">

                            <label class="form-label">Concepto</label>

                            <input type="text"
                                   name="concepto"
                                   id="conceptoInput"
                                   class="form-control"
                                   th:value="${evento != null} ? ${evento.concepto} : ''"
                                   required>

                            <div class="invalid-feedback">
                                Debe escribir el concepto del evento
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Fecha</label>

                                <input type="date"
                                       name="fecha"
                                       id="fechaInput"
                                       class="form-control"
                                       th:value="${evento != null} ? ${#temporals.format(evento.fechaEvento,'yyyy-MM-dd')} : ''"
                                       required>

                                <div class="invalid-feedback">
                                    La fecha no puede estar en el pasado
                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Hora</label>

                                <input type="time"
                                       name="hora"
                                       class="form-control"
                                       th:value="${evento != null} ? ${#temporals.format(evento.fechaEvento,'HH:mm')} : ''"
                                       required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>Descripción</label>

                            <textarea name="descripcion"
                                      id="descripcionInput"
                                      class="form-control"
                                      rows="4"
                                      maxlength="5000"
                                      required
                                      th:text="${evento != null} ? ${evento.descripcion} : ''"></textarea>

                            <div class="d-flex justify-content-between">

                                <small class="text-muted">Máx 5000 caracteres</small>

                                <small id="charCounter">0 / 5000</small>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>Etiquetas</label>

                            <input type="text"
                                   id="tagInput"
                                   class="form-control"
                                   placeholder="Escriba y presione ENTER">

                            <div id="tagContainer" class="mt-2"></div>

                            <input type="hidden"
                                   name="etiqueta"
                                   id="tagHidden"
                                   th:value="${etiquetasTexto}">

                        </div>

                        <hr>

                        <div class="row">

                            <div class="col-md-6">

                                <label>Lugar</label>

                                <select name="lugar"
                                        id="lugarSelect"
                                        class="form-select"
                                        required>

                                    <option value="">Seleccione...</option>

                                    <option th:each="l : ${lugares}"
                                            th:value="${l.id}"
                                            th:selected="${evento != null and evento.lugar != null} ? ${evento.lugar.id} == ${l.id} : false"
                                            th:data-img="${l.fotoDataUrl}"
                                            th:data-capacidad="${l.maxCapacidad}"
                                            th:text="${l.nombre + ' (Capacidad: ' + l.maxCapacidad + ')'}">
                                    </option>

                                </select>

                                <img id="lugarPreview"
                                     class="img-fluid rounded mt-2 d-none"
                                     style="height:180px;width:100%;object-fit:cover;">

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label>Duración (minutos)</label>

                                    <input type="number"
                                           name="duracion"
                                           class="form-control"
                                           min="1"
                                           th:value="${evento != null} ? ${evento.duracionMinutos} : ''"
                                           required>

                                </div>

                                <div class="mb-3">

                                    <label id="cupoLabel">Cupo máximo</label>

                                    <input type="number"
                                           id="cupoMaximo"
                                           name="cupoMaximo"
                                           class="form-control"
                                           min="3"
                                           max="300"
                                           th:value="${evento != null} ? ${evento.cupoMaximo} : ''"
                                           required>

                                    <div class="invalid-feedback">
                                        El cupo supera la capacidad del lugar
                                    </div>

                                </div>

                            </div>

                        </div>

                        <hr>

                        <div class="mb-3">

                            <label>Banner del evento</label>

                            <div id="dropZone"
                                 class="border rounded p-4 text-center"
                                 style="cursor:pointer">

                                Arrastra una imagen aquí o haz clic para subir

                                <input type="file"
                                       name="foto"
                                       id="bannerInput"
                                       accept="image/*"
                                       hidden>

                            </div>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/" class="btn btn-dark">
                                Cancelar
                            </a>

                            <button class="btn btn-success"
                                    th:text="${modo == 'editar'} ? 'Guardar Cambios' : 'Crear Evento'">
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>

    document.addEventListener("DOMContentLoaded", () => {

        const fechaInput = document.getElementById("fechaInput");
        const today = new Date().toISOString().split("T")[0];
        fechaInput.min = today;

        const descripcion = document.getElementById("descripcionInput");
        const counter = document.getElementById("charCounter");
        counter.textContent = descripcion.value.length + " / 5000";

        descripcion.addEventListener("input", () => {
            counter.textContent = descripcion.value.length + " / 5000";
        });

        const conceptoInput = document.getElementById("conceptoInput");
        const previewTitle = document.querySelector("h3");

        conceptoInput.addEventListener("input", () => {
            previewTitle.textContent = conceptoInput.value || previewTitle.textContent;
        });

        const bannerInput = document.getElementById("bannerInput");
        const previewBanner = document.getElementById("previewBanner");
        const dropZone = document.getElementById("dropZone");

        dropZone.addEventListener("click", () => bannerInput.click());

        bannerInput.addEventListener("change", () => {

            const file = bannerInput.files[0];
            if(!file) return;

            const reader = new FileReader();

            reader.onload = e => previewBanner.src = e.target.result;

            reader.readAsDataURL(file);

        });

        const lugarSelect = document.getElementById("lugarSelect");
        const lugarPreview = document.getElementById("lugarPreview");
        const cupoInput = document.getElementById("cupoMaximo");
        const cupoLabel = document.getElementById("cupoLabel");

        function actualizarLugar(){

            const option = lugarSelect.options[lugarSelect.selectedIndex];

            if(!option || !option.value){

                lugarPreview.classList.add("d-none");
                cupoInput.disabled = true;
                return;

            }

            const img = option.dataset.img;
            const capacidad = parseInt(option.dataset.capacidad);

            lugarPreview.src = img;
            lugarPreview.classList.remove("d-none");

            cupoInput.disabled = false;

            if(capacidad === 0){

                cupoInput.max = 9999;
                cupoLabel.textContent = "Cupo máximo (sin límite)";

            }else{

                cupoInput.max = capacidad;
                cupoLabel.textContent = "Cupo máximo (máx: " + capacidad + ")";

            }

        }

        lugarSelect.addEventListener("change", actualizarLugar);

        actualizarLugar();

        const tagInput = document.getElementById("tagInput");
        const tagContainer = document.getElementById("tagContainer");
        const tagHidden = document.getElementById("tagHidden");

        let tags = [];

        if(tagHidden.value){
            tags = tagHidden.value.split(",");
        }

        function renderTags(){

            tagContainer.innerHTML = "";

            tags.forEach((tag,i)=>{

                tagContainer.innerHTML +=
                    `
<span class="badge bg-dark text-decoration-none p-2 m-1 d-inline-flex align-items-center">
${tag}
<button type="button"
class="btn-close btn-close-white ms-2"
style="font-size:0.55rem"
onclick="removeTag(${i})">
</button>
</span>
`;

            });

            tagHidden.value = tags.join(",");

        }

        renderTags();

        tagInput.addEventListener("keydown", e => {

            if(e.key === "Enter"){

                e.preventDefault();

                const tag = tagInput.value.trim();

                if(!tag || tags.includes(tag)) return;

                tags.push(tag);

                renderTags();

                tagInput.value = "";

            }

        });

        window.removeTag = function(i){

            tags.splice(i,1);
            renderTags();

        };

        const form = document.querySelector(".needs-validation");

        form.addEventListener("submit", e => {

            if(!form.checkValidity()){

                e.preventDefault();
                e.stopPropagation();

            }

            form.classList.add("was-validated");

        });

    });

</script>

</body>
</html>
