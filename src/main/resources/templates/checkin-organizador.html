<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Organizador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>

    <style>
        #reader {
            width: 100%;
            max-width: 400px;
            margin: auto;
        }
        .btn {
            min-width: 150px;
            margin: 5px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container text-center mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-3">Check-in del Evento</h3>
        <p>Escanea el QR del asistente para registrar su asistencia</p>

        <div id="reader"></div>

        <div class="mt-4">
            <button id="startButton" class="btn btn-primary">Iniciar Lector</button>
            <button id="stopButton" class="btn btn-danger">Detener Lector</button>
        </div>

        <div class="mt-3">
            <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
        </div>

    </div>

</div>

<script>
    let html5QrcodeScanner;
    const readerId = "reader";

    document.getElementById("startButton").addEventListener("click", () => {
        html5QrcodeScanner = new Html5Qrcode(readerId);

        Html5Qrcode.getCameras().then(cameras => {
            if (cameras && cameras.length) {
                let cameraId = cameras[0].id;
                html5QrcodeScanner.start(
                    cameraId,
                    { fps: 10, qrbox: 250 },
                    qrCodeMessage => {
                        fetch(`/eventos/checkIn/${qrCodeMessage}`, { method: 'POST' })
                            .then(resp => resp.text())
                            .then(text => alert(text))
                            .catch(err => console.error(err));
                    },
                    errorMessage => {
                        console.warn(errorMessage);
                    }
                );
            }
        }).catch(err => console.error(err));
    });

    document.getElementById("stopButton").addEventListener("click", () => {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop()
                .then(() => console.log("Lector detenido"))
                .catch(err => console.error(err));
        }
    });
</script>

</body>
</html>
